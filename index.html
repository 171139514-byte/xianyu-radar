// ==================== 搜索记录 ====================
const HISTORY_KEY = 'xianyu_radar_history';
const MAX_HISTORY = 20;

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch { return []; }
}

function addHistory(keyword) {
  if (!keyword.trim()) return;
  let h = getHistory().filter(x => x !== keyword.trim());
  h.unshift(keyword.trim());
  h = h.slice(0, MAX_HISTORY);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  renderHistory();
}

function removeHistory(kw) {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(getHistory().filter(x => x !== kw)));
  renderHistory();
}

function clearHistory() {
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
  showToast('搜索记录已清空');
}

function renderHistory() {
  const sec = document.getElementById('historySection');
  const tags = document.getElementById('historyTags');
  const h = getHistory();
  if (h.length === 0) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  tags.innerHTML = h.map(kw =>
    `<span class="history-tag">
      <span class="del" onclick="event.stopPropagation(); removeHistory('${kw.replace(/'/g,"\\'")}')">×</span>
      ${kw}
    </span>`
  ).join('');
  tags.querySelectorAll('.history-tag').forEach(tag => {
    tag.onclick = () => {
      document.getElementById('keywordInput').value = tag.textContent.trim();
      doSearch();
    };
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function estimatePrice(keyword) {
  const kw = keyword.toUpperCase();
  for (const [k, v] of Object.entries(MARKET_PRICES)) {
    if (kw.includes(k.toUpperCase())) {
      if (v.specs) {
        for (const [s, p] of Object.entries(v.specs)) {
          if (kw.includes(s.toUpperCase())) return p;
        }
      }
      return v.base;
    }
  }
  return 2000;
}

    { id:13,title:`${title} 国行原装机 无拆无修 支持验货 假一赔十`, price:Math.round(mp*0.73), marketPrice:mp, credit:'极好', condition:'95新', city:'深圳', time:'1天前', wants:19, desc:'一手自用，无任何问题，支持任意方式验货。' },
    { id:14,title:`${title} 靓机 无任何问题 诚信交易 可小刀`, price:Math.round(mp*0.68), marketPrice:mp, credit:'优秀', condition:'95新', city:'南京', time:'3天前', wants:16, desc:'一直带壳贴膜，成色很好，功能全部正常。' },
    { id:15,title:`${title} 国行在保 功能全好 价格便宜 先到先得`, price:Math.round(mp*0.70), marketPrice:mp, credit:'优秀', condition:'95新', city:'苏州', time:'2天前', wants:14, desc:'国行在保，电池效率高，功能全部正常。' },
  ];
}

// ==================== 过滤 ====================
function filterProducts(products) {
  const log = [], passed = [], filtered = [];
  log.push(`📥 共抓取 ${products.length} 个商品，开始过滤...`);
  log.push('─'.repeat(50));

  products.forEach((p, i) => {
    let spamFound = null;
    for (const kw of SPAM_KEYWORDS) {
      if (p.title.includes(kw) || p.desc.includes(kw)) { spamFound = `含引流词 "${kw}"`; break; }
    }
    if (!spamFound && p.price / p.marketPrice < 0.10) spamFound = `价格仅市场价${((p.price/p.marketPrice)*100).toFixed(1)}%，异常偏低`;

    if (spamFound) {
      filtered.push({ ...p, filtered: true, reason: spamFound });
      log.push(`❌ #${i+1} | ¥${p.price} | ${spamFound}`);
    } else {
      passed.push(p);
      log.push(`✅ #${i+1} | ¥${p.price} | ${p.credit} | ${p.condition}`);
    }
  });
  log.push('─'.repeat(50));
  log.push(`✅ 通过 ${passed.length} 个 | ❌ 过滤 ${filtered.length} 个`);
  return { passed, filtered, log };
}

// ==================== 差价计算 ====================
function calcProfit(p) {
  const profit = p.marketPrice - p.price;
  const rate = (profit / p.marketPrice) * 100;
  let level = 'normal', badgeClass = 'badge-normal', badgeText = '✅ 正常';
  if (rate >= 40) { level = 'super'; badgeClass = 'badge-super'; badgeText = '🏆 超级漏'; }
  else if (rate >= 25) { level = 'big'; badgeClass = 'badge-big'; badgeText = '⭐ 大漏'; }
  else if (rate >= 15) { level = 'small'; badgeClass = 'badge-small'; badgeText = '💡 小漏'; }
  return { profit, rate, level, badgeClass, badgeText };
}

// ==================== 渲染 ====================
function renderProducts(passed, filtered, log) {
  const listEl = document.getElementById('productList');
  const logEl = document.getElementById('filterLog');
  logEl.innerHTML = log.join('<br>');
  logEl.classList.add('show');

  // 过滤后的显示列表
  let displayList = [...passed];
  if (currentFilters.spam === 'show') displayList = [...passed, ...filtered];
  if (displayList.length === 0) {
    listEl.innerHTML = `<div class="empty-state show"><div class="empty-icon">😢</div><h3>没有符合条件的商品</h3><p>试试调整筛选条件</p></div>`;
    return;
  }

  // 排序：引流商品排最后
  const sortOrder = { super:0, big:1, small:2, normal:3 };
  displayList.sort((a, b) => {
    if (a.filtered && !b.filtered) return 1;
    if (!a.filtered && b.filtered) return -1;
    if (a.filtered) return 0;
    return (sortOrder[calcProfit(a).level] || 9) - (sortOrder[calcProfit(b).level] || 9);
  });

  // 应用利润/信用/成色筛选
  let filteredDisplay = displayList;
  if (currentFilters.profit !== 'all') filteredDisplay = filteredDisplay.filter(p => !p.filtered && calcProfit(p).level === currentFilters.profit);
  if (currentFilters.credit !== 'all') {
    const map = { great: '极好', good: '优秀' };
    filteredDisplay = filteredDisplay.filter(p => !p.filtered && p.credit === map[currentFilters.credit]);
  }
  if (currentFilters.condition !== 'all') {
    if (currentFilters.condition === 'new') filteredDisplay = filteredDisplay.filter(p => !p.filtered && p.condition === '全新');
    if (currentFilters.condition === '95') filteredDisplay = filteredDisplay.filter(p => !p.filtered && ['95新','98新','99新'].includes(p.condition));
  }

  if (filteredDisplay.length === 0) {
    listEl.innerHTML = `<div class="empty-state show"><div class="empty-icon">😢</div><h3>没有符合条件的商品</h3><p>试试调整筛选条件</p></div>`;
    return;
  }

  listEl.innerHTML = filteredDisplay.map(p => {
    const info = calcProfit(p);
    const creditClass = p.credit === '极好' ? 'credit-great' : 'credit-good';
    const creditIcon = p.credit === '极好' ? '🏅' : '⭐';

    if (p.filtered) {
      return `<div class="product-card filtered-card">
        <div class="spam-badge">❌ 已过滤</div>
        <div class="product-title">${p.title}</div>
        <div class="product-meta"><span>🏙️ ${p.city}</span><span>⏰ ${p.time}</span><span>👀 ${p.wants}人想要</span><span>¥${p.price}</span></div>
        <div class="verify-tags"><span class="verify-tag danger">❌ ${p.reason}</span></div>
      </div>`;
    }
    return `<div class="product-card">
      <div class="price-badge ${info.badgeClass}">${info.badgeText}</div>
      <div class="product-title">${p.title}</div>
      <div class="product-meta">
        <span>🏙️ ${p.city}</span><span>⏰ ${p.time}</span><span>👀 ${p.wants}人想要</span>
        <span class="${creditClass}">${creditIcon} ${p.credit}</span><span>✨ ${p.condition}</span>
      </div>
      <div class="price-analysis">
        <div class="price-row"><span class="label">闲鱼价</span><span class="value highlight">¥${p.price.toLocaleString()}</span></div>
        <div class="price-row"><span class="label">市场价</span><span class="value danger">¥${p.marketPrice.toLocaleString()}</span></div>
        <div class="price-row"><span class="label">💰 利润空间</span><span class="value profit">+¥${info.profit.toLocaleString()} (${info.rate.toFixed(1)}%)</span></div>
      </div>
      <div class="verify-tags">
        <span class="verify-tag">✅ 价格合理</span><span class="verify-tag">✅ 无引流信息</span>
        <span class="verify-tag">✅ ${p.credit}信用</span><span class="verify-tag">✅ ${p.condition}</span>
      </div>
      <div class="product-actions">
        <button class="btn-buy" onclick="jumpToXianyu('${p.title.replace(/'/g,"\\'")}',${p.price})">立即购买 →</button>
        <button class="btn-save" onclick="showToast('已收藏')">⭐ 收藏</button>
      </div>
    </div>`;
  }).join('');
}

// ==================== 全局状态 ====================
let currentFilters = { profit:'all', credit:'all', condition:'all', spam:'filter' };
let allPassed = [], allFiltered = [], allLog = [];

// ==================== 搜索 ====================
function doSearch() {
  const kw = document.getElementById('keywordInput').value.trim();
  if (!kw) { showToast('请输入商品关键词'); return; }

  addHistory(kw);

  // 重置筛选和品类高亮
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.filter-row').forEach(row => { const f = row.querySelector('.filter-btn'); if(f) f.classList.add('active'); });
  document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
  currentFilters = { profit:'all', credit:'all', condition:'all', spam:'filter' };

  document.getElementById('initHint').style.display = 'none';
  document.getElementById('loading').classList.add('show');
  document.getElementById('productList').innerHTML = '';
  document.getElementById('filterLog').classList.remove('show');
  document.getElementById('statsBar').style.display = 'none';
  document.getElementById('footerTip').style.display = 'none';

  setTimeout(() => {
    const all = genData(kw);
    const { passed, filtered, log } = filterProducts(all);
    allPassed = passed; allFiltered = filtered; allLog = log;

    document.getElementById('loading').classList.remove('show');
    document.getElementById('statsBar').style.display = 'flex';
    document.getElementById('footerTip').style.display = 'block';
    document.getElementById('statTotal').textContent = all.length;
    document.getElementById('statFiltered').textContent = filtered.length;
    document.getElementById('statPassed').textContent = passed.length;
    document.getElementById('statGap').textContent = passed.filter(p => calcProfit(p).rate >= 15).length;

    renderProducts(passed, filtered, log);
    showToast(`找到 ${passed.length} 个有效商品`);
  }, 1200);
}

// ==================== 筛选切换 ====================
function toggleFilter(btn, type, value) {
  btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilters[type] = value;
  if (allPassed.length > 0) renderProducts(allPassed, allFiltered, allLog);
}

// ==================== 快捷搜索 ====================
function quickSearch(el, kw) {
  document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('keywordInput').value = kw;
  doSearch();
}

// ==================== 跳转 ====================
function jumpToXianyu(title, price) {
  if (confirm(`即将跳转到闲鱼搜索：${title}\n价格：¥${price}\n请仔细甄别真伪！\n\n点击确定继续。`)) {
    window.open(`https://s.16cg.cn/s?q=${encodeURIComponent(title)}`, '_blank');
  }
}

// ==================== 初始化 ====================
renderHistory();
document.getElementById('keywordInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
</script>
